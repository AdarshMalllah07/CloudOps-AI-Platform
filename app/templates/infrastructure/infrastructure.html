{% extends "layouts/base.html" %}

{% block content %}

<h1>Infrastructure</h1>

<h2>Environments</h2>

<table border="1" cellpadding="10">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Description</th>
    </tr>

    {% for environment in environments %}
    <tr>
        <td>{{ environment.id }}</td>
        <td>{{ environment.name }}</td>
        <td>{{ environment.description }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
