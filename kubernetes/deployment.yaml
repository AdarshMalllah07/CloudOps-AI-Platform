apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloudops-app
  namespace: cloudops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloudops-app

  template:
    metadata:
      labels:
        app: cloudops-app

    spec:
      containers:
        - name: cloudops-app
          image: cloudops-ai-platform-cloudops-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
