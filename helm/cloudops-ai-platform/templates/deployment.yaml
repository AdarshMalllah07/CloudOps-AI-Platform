apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloudops-app

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: cloudops-app

  template:
    metadata:
      labels:
        app: cloudops-app

    spec:
      containers:
        - name: cloudops-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Never

          ports:
            - containerPort: 5000
