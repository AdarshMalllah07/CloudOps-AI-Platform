services:

  postgres:
    image: postgres:17
    container_name: cloudops-postgres

    environment:
      POSTGRES_DB: cloudops_ai_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  cloudops-app:
    build: .
    container_name: cloudops-app

    ports:
      - "5000:5000"

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: cloudops_ai_platform
      DB_USER: postgres
      DB_PASSWORD: postgres123

    depends_on:
      - postgres

volumes:
  postgres_data:
